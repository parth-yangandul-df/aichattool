services:
  app-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: querywise
      POSTGRES_USER: querywise
      POSTGRES_PASSWORD: querywise_dev
    ports:
      - "5432:5432"
    volumes:
      - app_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U querywise -d querywise"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Sample target database for development/testing
  sample-db:
    image: postgres:16
    environment:
      POSTGRES_DB: sampledb
      POSTGRES_USER: sample
      POSTGRES_PASSWORD: sample_dev
    ports:
      - "5433:5432"
    volumes:
      - sample_db_data:/var/lib/postgresql/data
      - ./backend/tests/fixtures/sample_seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sample -d sampledb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://querywise:querywise_dev@app-db:5432/querywise
      ENVIRONMENT: development
      PYTHONPATH: /app
      # OLLAMA_BASE_URL comes from .env:
      #   host.docker.internal:11434 = native Ollama on host (default, GPU-accelerated on macOS)
      #   ollama:11434              = Docker Ollama (CPU-only, use with --profile ollama-docker)
    depends_on:
      app-db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # Ollama in Docker — CPU-only, fully self-contained
  # Start with: docker compose --profile ollama-docker up
  # Then pull models: docker compose exec ollama ollama pull llama3.1:8b
  #                   docker compose exec ollama ollama pull nomic-embed-text
  # NOTE: On macOS, prefer running Ollama natively for Metal GPU acceleration (see CLAUDE.md)
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama-docker"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for NVIDIA GPU support (Linux only):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  app_db_data:
  sample_db_data:
  ollama_data:
